<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | Stalcraft DB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 100px; font-family: sans-serif;">

    <form method="POST" style="background: #111; padding: 30px; border: 1px solid #333; border-radius: 8px; width: 300px;">
        <h3 style="color: #4ade80; margin-bottom: 20px; text-align: center;">Вход в систему</h3>

        <label style="font-size: 12px; color: #aaa;">Логин</label>
        <input type="text" name="username" placeholder="Введите логин" required
               style="width: 100%; margin: 5px 0 15px 0; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px;">

        <label style="font-size: 12px; color: #aaa;">Пароль</label>
        <input type="password" name="password" placeholder="Введите пароль" required
               style="width: 100%; margin: 5px 0 20px 0; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px;">

        <button type="submit" style="width: 100%; padding: 12px; background: #4ade80; border: none; cursor: pointer; font-weight: bold; color: #000; border-radius: 4px; text-transform: uppercase;">
            Войти
        </button>

        <p style="margin-top: 20px; text-align: center;">
            <a href="/register" style="color: #666; font-size: 12px; text-decoration: none;">Нет аккаунта? Зарегистрироваться</a>
        </p>
    </form>

</body>
</html>
